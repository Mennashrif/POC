name: Feature Deployed Hook

on:
  pull_request:
    types: [closed]
    branches:
      - Development

jobs:
  run-feature-deployed-skill:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: Development
          fetch-depth: 0

      - name: Copy WIP summaries into feature.md and clean up
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED=0

          for WIP in $(find . -path "*/.features/feature-WIP.md" -not -path "*/.git/*"); do
            SERVICE_DIR=$(dirname "$WIP" | xargs dirname)
            FEATURE_MD="$SERVICE_DIR/.features/feature.md"

            echo "Processing $WIP"

            # Extract the ## Summary section from feature-WIP.md
            SUMMARY=$(awk '/^## Summary/{found=1} found{print}' "$WIP")

            if [ -z "$SUMMARY" ]; then
              echo "No ## Summary section found in $WIP, skipping."
              continue
            fi

            # Append summary to feature.md (create if it doesn't exist)
            if [ ! -f "$FEATURE_MD" ]; then
              echo "# Feature History" > "$FEATURE_MD"
              echo "" >> "$FEATURE_MD"
            fi

            echo "" >> "$FEATURE_MD"
            echo "$SUMMARY" >> "$FEATURE_MD"

            # Delete the WIP file
            rm "$WIP"

            CHANGED=1
          done

          if [ "$CHANGED" -eq 1 ]; then
            git add -A
            git commit -m "docs: update feature.md and remove WIP after merge"
            git push origin Development
          else
            echo "No feature-WIP.md files found, nothing to do."
          fi
